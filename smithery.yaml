# Smithery configuration file: https://smithery.ai/docs/deployments

build:
  dockerBuildPath: ./apps/mcp
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      browseApiKey:
        type: string
        description: BrowseAI Dev API key (get one at https://browseai.dev/dashboard)
  commandFunction:
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { BROWSE_API_KEY: config.browseApiKey || '' } })
