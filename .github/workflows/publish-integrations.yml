name: Publish Integration Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/crewai-browseaidev/**'
      - 'packages/langchain-browseaidev/**'
      - 'packages/llamaindex-browseaidev/**'
      - '!packages/**/README.md'

jobs:
  publish-crewai:
    name: Publish crewai-browseaidev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build twine
      - name: Check version
        id: version
        working-directory: packages/crewai-browseaidev
        run: |
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PUBLISHED=$(python -c "import urllib.request, json; data=json.loads(urllib.request.urlopen('https://pypi.org/pypi/crewai-browseaidev/json').read()); print(data['info']['version'])" 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing: $PUBLISHED -> $CURRENT"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Build & Publish
        if: steps.version.outputs.skip != 'true'
        working-directory: packages/crewai-browseaidev
        run: python -m build && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

