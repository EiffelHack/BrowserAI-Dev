[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-browseaidev"
version = "0.1.0"
description = "LangChain integration for BrowseAI Dev — verified web search with citations and confidence scores for AI agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "BrowseAI Dev" }]
keywords = [
    "langchain", "langchain-tools", "browseaidev", "browseai-dev",
    "ai-agent", "web-search", "fact-checking", "citations",
    "confidence-scoring", "mcp", "rag", "hallucination-prevention",
    "verified-search", "evidence-based", "crewai", "autogen",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "langchain-core>=0.2.0",
    "browseaidev>=0.1.7",
]

[project.urls]
Homepage = "https://browseai.dev"
Documentation = "https://browseai.dev/docs"
Repository = "https://github.com/BrowseAI-HQ/BrowseAI-Dev"
Discord = "https://discord.gg/ubAuT4YQsT"
