[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "browseaidev"
version = "0.3.0"
description = "Python SDK for BrowseAI Dev — reliable research infrastructure for AI agents"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "BrowseAI Dev" }]
keywords = ["ai", "research", "search", "agents", "mcp", "langchain", "crewai", "rag", "deep-search", "web-search", "citations", "evidence", "llm", "agent-tools", "autogpt", "llamaindex", "fact-checking", "ai-search", "browseai", "browse-ai", "browseaidev", "browseai-dev", "confidence-scoring", "hallucination-prevention"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.scripts]
browseaidev = "browseaidev.cli:main"

[project.optional-dependencies]
langchain = ["langchain-core>=0.2.0"]
crewai = ["crewai>=0.41.0"]

[project.urls]
Homepage = "https://browseai.dev"
Documentation = "https://browseai.dev/developers"
Repository = "https://github.com/BrowseAI-HQ/BrowseAI-Dev"
Discord = "https://discord.gg/ubAuT4YQsT"
